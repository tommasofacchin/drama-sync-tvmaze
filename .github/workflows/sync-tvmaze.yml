name: Sync TVMaze

on:
  schedule:
    - cron: "0 1 * * *"   
  workflow_dispatch:       

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run sync job
        run: npm run sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
